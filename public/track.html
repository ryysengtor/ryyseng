  <link rel="apple-touch-icon" sizes="180x180" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='36' fill='%23080808'/%3E%3Ctext x='90' y='90' dominant-baseline='central' text-anchor='middle' font-family='system-ui,sans-serif' font-weight='700' font-size='100' fill='%2334d399'%3ED%3C/text%3E%3C/svg%3E">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#181818;--bg1:#1a1a1a;--bg2:#212121;--bg3:#2a2a2a;--line:#2E2E2E;--line2:#3a3a3a;--em:#34d399;--em-rgb:52,211,153;--em2:#6ee7b7;--red:#f87171;--yellow:#fbbf24;--sky:#38bdf8;--t1:#e5e5e5;--t2:#a0a0a0;--t3:#616161;--t4:rgba(255,255,255,.07);--mono:'Ubuntu Mono',monospace;--font:'DM Sans',system-ui,sans-serif;--rad:4px;--rs:4px}
html,body{min-height:100%;background:var(--bg);color:var(--t1);font-family:var(--font);font-size:13.5px;overscroll-behavior: none;
}
body{display:flex;flex-direction:column;align-items:center;padding:1.5rem 1rem 3rem}

.wrap{width:100%;max-width:520px;position:relative;z-index:1}
.back-btn{display:inline-flex;align-items:center;gap:.35rem;font-size:.65rem;font-weight:600;color:var(--t3);text-decoration:none;transition:color .15s;margin-bottom:1rem}
.back-btn:hover{color:var(--t1)}
.card{background:var(--bg1);border:1px solid var(--line2);border-radius:4px;overflow:hidden;box-shadow:0 0 0 1px rgba(255,255,255,.03),0 8px 24px rgba(0,0,0,.5)}
.card-head{padding:1.25rem 1.5rem;border-bottom:1px solid var(--line)}
.card-title{font-family:'DM Sans',system-ui;font-size:1.5rem;font-weight:400;margin-bottom:.25rem}
.card-sub{font-size:.68rem;color:var(--t3)}
.card-body{padding:1.25rem 1.5rem}
.f-label{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin-bottom:.35rem}
.f-inp{width:100%;background:var(--bg2);border:1px solid var(--line2);border-radius:var(--rs);padding:.62rem .85rem;color:var(--t1);font-family:var(--font);font-size:.78rem;outline:none;transition:border-color .15s}
.f-inp:focus{border-color:rgba(var(--em-rgb),.4)}
.btn{display:flex;align-items:center;justify-content:center;gap:.35rem;width:100%;padding:.72rem;border-radius:var(--rs);border:none;font-family:var(--font);font-size:.78rem;font-weight:700;cursor:pointer;transition:all .18s;margin-top:.75rem}
.btn-em{background:var(--em);color:#040d09}
.btn-em:hover{background:var(--em2)}
.btn-em:disabled{opacity:.4;cursor:not-allowed}
.btn-ghost{background:var(--bg2);border:1px solid var(--line2);color:var(--t1);text-decoration:none;display:flex;justify-content:center;align-items:center}
.btn-ghost:hover{border-color:var(--line2)}
.results{margin-top:1.25rem}
.order-card{background:var(--bg2);border:1px solid var(--line);border-radius:var(--rs);margin-bottom:.6rem;overflow:hidden}
.order-head{padding:.65rem .85rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line)}
.order-prod{font-weight:700;font-size:.78rem}
.order-var{font-size:.6rem;color:var(--t3);margin-top:.1rem}
.badge{display:inline-flex;align-items:center;font-size:.58rem;font-weight:700;padding:.15rem .5rem;border-radius:4px;text-transform:uppercase;letter-spacing:.06em}
.badge-ok{background:rgba(var(--em-rgb),.1);color:var(--em);border:1px solid rgba(var(--em-rgb),.2)}
.badge-pend{background:rgba(251,191,36,.08);color:var(--yellow);border:1px solid rgba(251,191,36,.15)}
.badge-fail{background:rgba(248,113,113,.08);color:var(--red);border:1px solid rgba(248,113,113,.15)}
.order-body{padding:.65rem .85rem;font-size:.72rem}
.d-row{display:flex;justify-content:space-between;padding:.22rem 0;border-bottom:1px solid var(--line)}
.d-row:last-child{border:none}
.dk{color:var(--t3)}.dv{font-weight:600;text-align:right;max-width:65%;word-break:break-all}
.dv.em{color:var(--em)}
.data-box{background:var(--bg3);border:1px solid var(--line);border-radius:var(--rs);padding:.65rem .85rem;margin-top:.6rem;font-size:.72rem}
.data-box-title{font-size:.57rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin-bottom:.5rem;display:flex;align-items:center;gap:.3rem}
.mono{font-family:monospace;font-size:.74rem}
.cp-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:.3rem}
.cp-btn{width:22px;height:22px;background:var(--bg2);border:1px solid var(--line);border-radius:4px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .15s}
.cp-btn:hover{border-color:var(--em);background:rgba(var(--em-rgb),.1)}
.cp-btn svg{width:10px;height:10px;color:var(--t3)}
.cp-btn:hover svg{color:var(--em)}
.notif{position:fixed;top:1rem;left:50%;transform:translateX(-50%) translateY(-12px);display:flex;align-items:flex-start;gap:.5rem;padding:.65rem 1.1rem .65rem .75rem;border-radius:4px;font-size:.78rem;font-weight:700;z-index:100000;opacity:0;pointer-events:none;transition:opacity .22s,transform .22s;white-space:normal;word-break:break-word;max-width:min(380px,92vw);backdrop-filter:blur(12px);box-shadow:0 16px 48px rgba(0,0,0,.8)}
.notif.show{opacity:1;transform:translateX(-50%) translateY(0)}
.notif.ok{background:rgba(20,20,20,.98);border:2px solid rgba(var(--em-rgb),.5);color:var(--em)}
.notif.err{background:rgba(20,20,20,.98);border:2px solid rgba(248,113,113,.5);color:var(--red)}
.notif.info{background:rgba(20,20,20,.98);border:2px solid rgba(255,255,255,.2);color:var(--t1)}
.notif-icon{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.notif-icon svg{width:12px;height:12px}
.notif.ok .notif-icon{background:rgba(var(--em-rgb),.2)}
.notif.err .notif-icon{background:rgba(248,113,113,.18)}
.notif.info .notif-icon{background:rgba(255,255,255,.1)}
.empty{text-align:center;padding:2rem;color:var(--t3);font-size:.75rem}
.spin{animation:spin .7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.fadein{animation:fadein .3s ease}

body{
  background-color:#181818!important;
  background-image:
    linear-gradient(rgba(255,255,255,.028) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.028) 1px,transparent 1px)!important;
  background-size:50px 50px!important;
  position:relative;
}

body::before{
  content:'';position:fixed;top:40%;left:50%;
  transform:translate(-50%,-50%);
  width:800px;height:600px;
  background:radial-gradient(ellipse,rgba(255,255,255,.028) 0%,transparent 65%)!important;
  filter:blur(80px)!important;pointer-events:none;z-index:0;
}

body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse at 50% 0%,rgba(255,255,255,.018),transparent 55%),
    radial-gradient(ellipse at 100% 100%,rgba(255,255,255,.01),transparent 50%)!important;
}

button,a,[role=button]{min-height:36px}
@media(max-width:480px){
  button,a,[role=button]{min-height:40px}
}

@media(max-width:600px){
  .modal{border-radius:4px 20px 0 0!important;max-height:93vh!important;
    animation:_mobileModalIn .32s cubic-bezier(.32,1,.4,1) both!important}
  @keyframes _mobileModalIn{
    from{opacity:0;transform:translateY(100%)}
    to{opacity:1;transform:translateY(0)}
  }
  .overlay,.modal-bg{align-items:flex-end!important;padding:0!important}
  .cfd{border-radius:4px 20px 0 0!important;max-width:100%!important;width:100%!important}
}

.m-body,.cnt-tbl-scroll,.ord-card,.dep-card{-webkit-overflow-scrolling:touch}

.card,.ord-card,.dep-card,.acc-card{
  animation:_cardIn .4s cubic-bezier(.22,1,.36,1) both;
}
@keyframes _cardIn{
  from{opacity:0;transform:translateY(16px) scale(.98)}
  to{opacity:1;transform:none}
}

button:active:not(:disabled){transform:scale(.97)!important;transition:transform .08s!important}

.sec.on{animation:_secIn .3s cubic-bezier(.22,1,.36,1) both}
@keyframes _secIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

.cnt-tbl tbody tr{transition:background .12s ease}

.f-inp,.pf-input,.finp,.l-inp,.f-inp{transition:border-color .15s ease,box-shadow .15s ease!important}

@keyframes _pulse{0%{box-shadow:0 0 0 0 rgba(52,211,153,.35)}70%{box-shadow:0 0 0 8px rgba(52,211,153,0)}100%{box-shadow:0 0 0 0 rgba(52,211,153,0)}}
.ab-pulse{animation:_pulse 2s ease infinite!important}

@keyframes _shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel{background:linear-gradient(90deg,var(--bg1) 25%,var(--bg2) 50%,var(--bg1) 75%)!important;background-size:400% 100%!important;animation:_shimmer 1.6s ease infinite!important}

.modal-bg,.overlay,.cfd-bg{transition:opacity .2s ease!important}

.toast.on,.notif.show{animation:_toastIn .28s cubic-bezier(.34,1.56,.64,1) both!important}
@keyframes _toastIn{from{opacity:0;transform:translateX(-50%) translateY(-20px) scale(.9)}to{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}}

:root{--trans:.18s cubic-bezier(.4,0,.2,1)}

.nav-btn,.n-btn{border-radius:4px!important;transition:all var(--trans)!important}

.btn-em,.m-pay-btn,.l-btn,.submit-btn,.free-claim-btn{
  border-radius:4px!important;
  transition:all var(--trans)!important;
  position:relative;overflow:hidden;
}
.btn-em:not(:disabled){box-shadow:0 4px 18px rgba(52,211,153,.22)!important}
.btn-em:hover:not(:disabled){
  box-shadow:0 6px 26px rgba(52,211,153,.35)!important;
  transform:translateY(-1px)!important;
}
.btn-em:active:not(:disabled){transform:translateY(0)!important}

.f-inp:focus,.finp:focus,.l-inp:focus,.ph-inp:focus,.pf-input:focus,.cnt-search:focus,.srv-search:focus{
  box-shadow:0 0 0 3px rgba(52,211,153,.07)!important;
}

.card:hover,.ord-card:hover,.plan-card:hover,.info-link-card:hover{
  transition:all var(--trans)!important;
}

.badge,.qr-badge,.ord-status,.sbadge,.card-badge{border-radius:4px!important}

::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:2px}

.wrap,.main,.c-body{animation:_pageIn .35s ease both}
@keyframes _pageIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

nav,.nav,.topbar{backdrop-filter:blur(12px)!important;-webkit-backdrop-filter:blur(12px)!important}

.btn-sm,.vc-apply-btn,.cnt-buy-btn,.cnt-buy,.receipt-btn{border-radius:4px!important}

.cnt-sort-btn,.dur-lbl,.days-lbl,.cat{border-radius:4px!important}
</style>

<style>

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--line2);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:var(--line3)}
body{
  background-color:var(--bg) !important;
  background-image:linear-gradient(rgba(255,255,255,.022) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.022) 1px,transparent 1px) !important;
  background-size:40px 40px !important;
}
::selection{background:rgba(74,222,128,.18);color:#e5e5e5}
</style>
</head>
<body>
<div class="notif" id="notif"><div class="notif-icon" id="notifIcon"></div><span id="notifMsg"></span></div>

<div class="wrap">
  <a href="/" class="back-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="12" height="12"><polyline points="15 18 9 12 15 6"/></svg>
    Kembali ke Toko
  </a>

  <div class="card fadein">
    <div class="card-head">
      <div class="card-title">Cek Order</div>
      <div class="card-sub">Masukkan nomor HP atau ID transaksi untuk melihat riwayat pembelian</div>
    </div>
    <div class="card-body">
      <div class="f-label">Nomor HP atau ID Transaksi</div>
      <input class="f-inp" id="queryInp" placeholder="0812xxxxxxxx  atau  TRX-xxxxxx" maxlength="40"
        onkeydown="if(event.key==='Enter')search()">
      <button class="btn btn-em" id="searchBtn" onclick="search()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="14" height="14"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        Cari Order
      </button>

      <div id="results" class="results"></div>
    </div>
  </div>

  <a href="/" class="btn btn-ghost" style="margin-top:1rem;text-decoration:none">Kembali Belanja</a>
</div>

<script>
var _nt = null;
function notify(msg, type) {
  var n=document.getElementById('notif'),ic=document.getElementById('notifIcon'),m=document.getElementById('notifMsg');
  type=type||'info';
  var icons={ok:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>',err:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>',info:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>'};
  n.className='notif '+type; ic.innerHTML=icons[type]||icons.info; m.textContent=msg;
  n.classList.add('show'); clearTimeout(_nt); _nt=setTimeout(function(){n.classList.remove('show');},type==='err'?3500:2000);
}
function idr(n){var v=Number(n);if(!isFinite(v)||isNaN(v))v=0;return 'Rp'+v.toLocaleString('id-ID');}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmtDate(ts){return ts?new Date(ts).toLocaleString('id-ID',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}):'—';}
function cp(text){

  var val = (typeof text === 'string' && document.getElementById(text)) ? document.getElementById(text).textContent : text;
  if (!val) return;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(val).then(function(){notify('Disalin','ok');}).catch(function(){_cpFallback(val);});
  } else { _cpFallback(val); }
}
function _cpFallback(val) {
  var ta = document.createElement('textarea');
  ta.value = val; ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0';
  document.body.appendChild(ta); ta.select();
  try { document.execCommand('copy'); notify('Disalin','ok'); } catch(e) { notify('Gagal salin','err'); }
  document.body.removeChild(ta);
}

function _safeHrefT(url) {
  if (!url || typeof url !== 'string') return '#';
  var u = url.trim().toLowerCase();
  if (u.startsWith('javascript:') || u.startsWith('data:') || u.startsWith('vbscript:')) return '#';
  return url;
}

async function search() {
  var q = document.getElementById('queryInp').value.trim();
  if (!q) { notify('Masukkan nomor HP atau ID transaksi', 'err'); return; }
  var btn = document.getElementById('searchBtn');
  btn.disabled = true; btn.textContent = 'Mencari...';
  document.getElementById('results').innerHTML = '<div class="empty"><span class="spin"></span> Mencari...</div>';
  try {
    var r = await fetch('/api/history', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({query:q})});
    var j = await r.json();
    if (!j.ok) { document.getElementById('results').innerHTML = '<div class="empty">'+esc(j.message||'Tidak ditemukan')+'</div>'; notify(j.message||'Tidak ditemukan','err'); }
    else renderResults(j.data);
  } catch(e) { document.getElementById('results').innerHTML = '<div class="empty">Koneksi error.</div>'; notify('Koneksi error','err'); }
  btn.disabled = false; btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="14" height="14"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg> Cari Order';
}

function renderResults(orders) {
  var con = document.getElementById('results');
  if (!orders.length) { con.innerHTML = '<div class="empty">Tidak ada order ditemukan.</div>'; return; }
  con.innerHTML = orders.map(function(d) {
    var statusBadge = d.status==='COMPLETED' ? '<span class="badge badge-ok">Selesai</span>'
      : d.status==='PENDING'||d.status==='FREE_PENDING' ? '<span class="badge badge-pend">Pending</span>'
      : '<span class="badge badge-fail">'+esc(d.status)+'</span>';

    var resultHtml = '';
    if (d.status === 'COMPLETED' && d.result) {
      var rs = d.result;
      if (rs.type === 'panel' || rs.type === 'renewal') {
        resultHtml = '<div class="data-box"><div class="data-box-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="11" height="11" stroke-linecap="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg> Data Panel</div>'
          + cpRow('Domain', rs.domain)
          + cpRow('Username', rs.username)
          + cpRow('Password', rs.password||'(tidak berubah)')
          + (rs.expiresAt?'<div class="d-row"><span class="dk">Expired</span><span class="dv">'+fmtDate(rs.expiresAt)+'</span></div>':'')
          + '</div>';
      } else if (rs.type === 'sewabot') {
        resultHtml = '<div class="data-box"><div class="data-box-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="11" height="11" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg> Info Sewa Bot</div>'
          + (rs.groupUrl ? '<div class="d-row"><span class="dk">Link Grup</span><div style="display:flex;align-items:center;gap:.3rem"><a href="'+_safeHrefT(rs.groupUrl)+'" target="_blank" rel="noopener" style="color:var(--sky);font-size:.7rem;word-break:break-all">'+esc(rs.groupUrl)+'</a><button class="cp-btn" data-val="'+String(rs.groupUrl).replace(/&/g,"&amp;").replace(/"/g,"&quot;")+'" onclick="cp(this.dataset.val)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button></div></div>' : '<div class="d-row"><span class="dk">Link Grup</span><span class="dv" style="color:var(--t4);font-style:italic">Belum ada — hubungi admin</span></div>')
          + (rs.days?'<div class="d-row"><span class="dk">Durasi</span><span class="dv em">'+esc(String(rs.days))+' Hari</span></div>':'')
          + '<div class="d-row"><span class="dk">Catatan</span><span class="dv" style="color:var(--t3);font-size:.67rem">Jika dalam 1×24 jam bot belum dipasang, hubungi admin dengan ID order di atas.</span></div>'
          + '</div>';
      } else if (rs.type === 'content') {
        var ctHtml = '';
        if (rs.contentType === 'link' && rs.contentUrl) {
          ctHtml = '<div class="data-box-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="11" height="11" stroke-linecap="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg> Link Produk</div><a href="'+esc(rs.contentUrl)+'" target="_blank" rel="noopener" style="color:var(--sky);font-size:.72rem;word-break:break-all">'+esc(rs.contentUrl)+'</a>';
        } else if (rs.contentType === 'file' && rs.contentUrl) {
          ctHtml = '<div class="data-box-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="11" height="11" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> File Produk</div><a href="'+esc(rs.contentUrl)+'" download target="_blank" rel="noopener noreferrer" style="display:inline-flex;align-items:center;gap:.3rem;margin-top:.4rem;padding:.35rem .75rem;background:var(--em);color:#040d09;border-radius:4px;font-size:.68rem;font-weight:700;text-decoration:none"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="12" height="12" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Download</a>';
        } else if (rs.parsedAccount && rs.parsedAccount.email && rs.parsedAccount.password) {
          // Akun format email|password atau email:password — tampil terstruktur
          ctHtml = '<div class="data-box-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="11" height="11" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> Data Akun</div>'
            + cpRow('Email / Username', rs.parsedAccount.email)
            + cpRow('Password', rs.parsedAccount.password)
            + '<button id="_cpAllAcct" style="margin-top:.5rem;font-size:.6rem;color:var(--em);background:none;border:1px solid rgba(52,211,153,.2);border-radius:3px;padding:.2rem .6rem;cursor:pointer;font-family:var(--font)">Salin Semua</button>';
          setTimeout(function(){var b=document.getElementById('_cpAllAcct');if(b){var v=rs.parsedAccount.email+'|'+rs.parsedAccount.password;b.onclick=function(){cp(v);};b.removeAttribute('id');}},0);
        } else if (rs.parsedAccount && rs.parsedAccount.lines) {
          // Multi-baris — tampil per baris
          ctHtml = '<div class="data-box-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="11" height="11" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Konten Produk</div>'
            + rs.parsedAccount.lines.map(function(l,i){ return cpRow('Baris '+(i+1), l); }).join('')
            + '<button id="_cpAllLines" style="margin-top:.5rem;font-size:.6rem;color:var(--em);background:none;border:1px solid rgba(52,211,153,.2);border-radius:3px;padding:.2rem .6rem;cursor:pointer;font-family:var(--font)">Salin Semua</button>';
          setTimeout(function(){var b=document.getElementById('_cpAllLines');if(b){var v=rs.contentText;b.onclick=function(){cp(v);};b.removeAttribute('id');}},0);
        } else if (rs.contentText) {
          ctHtml = '<div class="data-box-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="11" height="11" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg> Konten Produk</div>'
            + '<div class="mono" style="white-space:pre-wrap;word-break:break-word;color:var(--t1);font-size:.7rem;line-height:1.6">'+esc(rs.contentText)+'</div>'
            + '<button id="_cpText" style="margin-top:.5rem;font-size:.6rem;color:var(--em);background:none;border:1px solid rgba(52,211,153,.2);border-radius:3px;padding:.2rem .6rem;cursor:pointer;font-family:var(--font)">Salin</button>';
          setTimeout(function(){var b=document.getElementById('_cpText');if(b){var v=rs.contentText;b.onclick=function(){cp(v);};b.removeAttribute('id');}},0);
        }
        if (ctHtml) resultHtml = '<div class="data-box">'+ctHtml+'</div>';
      } else if (rs.type === 'error') {
        resultHtml = '<div class="data-box" style="border-color:rgba(248,113,113,.2)"><div class="data-box-title" style="color:var(--red)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="11" height="11" stroke-linecap="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg> Produk Error</div><div style="font-size:.72rem;color:var(--t2)">'+esc(rs.message||'Hubungi admin.')+'</div></div>';
      }
    }

    return '<div class="order-card fadein"><div class="order-head"><div><div class="order-prod">'+esc(d.productName)+'</div><div class="order-var">'+esc(d.variantName)+'</div></div>'+statusBadge+'</div>'
      + '<div class="order-body">'
      + '<div class="d-row"><span class="dk">ID</span><span class="dv mono">'+esc(d.id)+'</span></div>'
      + '<div class="d-row"><span class="dk">Tanggal</span><span class="dv">'+fmtDate(d.createdAt)+'</span></div>'
      + '<div class="d-row"><span class="dk">Total</span><span class="dv em">'+idr(d.totalBayar||0)+'</span></div>'
      + (d.phone?'<div class="d-row"><span class="dk">HP</span><span class="dv">'+esc(d.phone)+'</span></div>':'')
      + resultHtml
      + (d.status==='COMPLETED'?'<div style="margin-top:.55rem;display:flex;align-items:center;gap:.75rem;flex-wrap:wrap"><a href="/pay?id='+esc(d.id)+'" target="_blank" rel="noopener" style="font-size:.65rem;color:var(--t3);text-decoration:none;transition:color .15s" onmouseover="this.style.color=\'var(--t1)\'" onmouseout="this.style.color=\'var(--t3)\'">Lihat struk →</a>'+(d.productId?'<a href="/produk?id='+esc(d.productId)+'" style="font-size:.65rem;color:var(--em);text-decoration:none;font-weight:600;transition:opacity .15s" onmouseover="this.style.opacity=\'.7\'" onmouseout="this.style.opacity=\'1\'">Lihat produk →</a>':'')+'</div>':'')
      + '</div></div>';
  }).join('');
}

function cpRow(label, val) {
  if (!val) return '';
  var safeVal = String(val).replace(/&/g,'&amp;').replace(/"/g,'&quot;');
  return '<div class="cp-row"><span style="color:var(--t3)">' + esc(label) + '</span><div style="display:flex;align-items:center;gap:.3rem"><span class="mono">' + esc(val) + '</span><button class="cp-btn" data-val="' + safeVal + '" onclick="cp(this.dataset.val)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button></div></div>';
}

// ── GLOBAL SETTINGS APPLICATOR

function _hexToRgb(hex) {
  hex = hex.replace('#','');
  if (hex.length === 3) hex = hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
  var r = parseInt(hex.substring(0,2),16);
  var g = parseInt(hex.substring(2,4),16);
  var b = parseInt(hex.substring(4,6),16);
  return r+','+g+','+b;
}
function applyGlobalSettings(s) {
  if (!s) return;
  if (s.primaryColor) {
    document.documentElement.style.setProperty('--em', s.primaryColor);
    document.documentElement.style.setProperty('--em2', s.primaryColor);
    document.documentElement.setAttribute('data-em', s.primaryColor);
    // Set --em-rgb for use in rgba(var(--em-rgb), opacity)
    var _rgb = _hexToRgb(s.primaryColor);
    document.documentElement.style.setProperty('--em-rgb', _rgb);
    var _tmeta = document.querySelector('meta[name="theme-color"]'); if (_tmeta) _tmeta.setAttribute('content', s.primaryColor);
  }
  if (s.storeName) {
    document.querySelectorAll('[data-store-name], #storeName, #ftName, .js-store-name').forEach(function(el){ el.textContent = s.storeName; });
    if (!document.title.toLowerCase().includes('admin')) document.title = s.storeName;
  }
  if (s.logoUrl) {
    document.querySelectorAll('[data-logo-img]').forEach(function(el){ el.src = s.logoUrl; el.style.display = ''; });
    document.querySelectorAll('[data-logo-placeholder]').forEach(function(el){ el.style.display = 'none'; });
  }
  if (s.footerText) document.querySelectorAll('[data-footer-text]').forEach(function(el){ el.textContent = s.footerText; });
  if (s.wa) document.querySelectorAll('[data-wa-link]').forEach(function(el){ el.href = s.wa; });
  if (s.announcement) { var ab = document.getElementById('announcementBar'); if (ab) { ab.textContent = s.announcement; ab.style.display = ''; } }
  applyGlobalBg(s);
}
function applyGlobalBg(s) {
  var old = document.getElementById('_gbg'); if (old) old.remove();
  if (!s || !s.bgUrl) return;
  var op = s.bgOpacity != null ? parseFloat(s.bgOpacity) : 0.15;
  var el = document.createElement('div');
  el.id = '_gbg';
  el.setAttribute('aria-hidden','true');
  el.style.cssText = 'position:fixed;inset:0;z-index:-1;pointer-events:none;overflow:hidden;will-change:transform;transform:translateZ(0)';
  if (s.bgType === 'video') {
    var v = document.createElement('video');
    v.src = s.bgUrl; v.autoplay = true; v.loop = true; v.muted = true; v.playsInline = true;
    v.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:'+op+';transform:translateZ(0)';
    el.appendChild(v);
  } else {
    var img = document.createElement('div');
    img.style.cssText = 'position:absolute;inset:0;background-image:url('+JSON.stringify(s.bgUrl)+');background-size:cover;background-position:center;opacity:'+op+';transform:translateZ(0)';
    el.appendChild(img);
  }
  document.body.insertBefore(el, document.body.firstChild);
}

// Load global settings
fetch('/api/products').then(function(r){return r.json();}).then(function(j){
  if(j.settings) applyGlobalSettings(j.settings);
}).catch(function(){});

// Auto-search if ?q= param present
var q = new URLSearchParams(location.search).get('q');
if (q) { document.getElementById('queryInp').value = q; search(); }

// Register service worker
if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(function(){});

// ── REAL-TIME: Store SSE — settings & maintenance updates
(function connectStoreSSE() {
  try {
    var _src = new EventSource('/api/store/stream');
    _src.onmessage = function(e) {
      try {
        var d = JSON.parse(e.data);
        if (d.type === 'reconnect') { _src.close(); setTimeout(connectStoreSSE, 1500); return; }
        if (d.type === 'settings_update' && d.settings) {
          applyGlobalSettings(d.settings);
        }
        if (d.type === 'reload') {
          // Re-fetch settings silently
          fetch('/api/products').then(function(r){return r.json();}).then(function(j){
            if (j.settings) applyGlobalSettings(j.settings);
          }).catch(function(){});
        }
        if (d.type === 'maintenance' && d.on) {
          document.body.innerHTML = '<div style="position:fixed;inset:0;background:#0a0a0f;display:flex;align-items:center;justify-content:center;font-family:system-ui,sans-serif;color:#f0f0f0;font-size:.9rem;text-align:center;padding:2rem">' + esc(d.msg || 'Sedang dalam maintenance.') + '</div>';
        }
      } catch(ex){}
    };
    _src.onerror = function(){ _src.close(); setTimeout(connectStoreSSE, 5000); };
  } catch(ex){}
})();
</script>
