<html lang="id">
<head>
<meta charset="UTF-8">

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23080808'/%3E%3Crect width='32' height='32' rx='7' fill='none' stroke='%2334d399' stroke-width='1.5' stroke-opacity='.4'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-family='system-ui,sans-serif' font-weight='700' font-size='17' fill='%2334d399'%3ED%3C/text%3E%3C/svg%3E">
  <link rel="apple-touch-icon" sizes="180x180" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='36' fill='%23080808'/%3E%3Ctext x='90' y='90' dominant-baseline='central' text-anchor='middle' font-family='system-ui,sans-serif' font-weight='700' font-size='100' fill='%2334d399'%3ED%3C/text%3E%3C/svg%3E">

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Ubuntu+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#181818;--bg1:#1a1a1a;--bg2:#212121;--bg3:#2a2a2a;
  --line:#2E2E2E;--line2:#3a3a3a;--line3:#484848;
  --em:#34d399;--em-rgb:52,211,153;--em2:#6ee7b7;--red:#f87171;--yellow:#fbbf24;
  --t1:#e5e5e5;--t2:#a0a0a0;--t3:#616161;--t4:rgba(255,255,255,.07);
  --mono:'Ubuntu Mono',monospace;--font:'DM Sans',system-ui,sans-serif;--rad:4px;--rs:4px;
}
html,body{height:100%; overscroll-behavior: none;
}
body{font-family:var(--font);background:var(--bg);color:var(--t1);letter-spacing:-.3px;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:1.5rem 1rem 3rem;font-size:13.5px}

@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin .7s linear infinite;display:inline-block}
@keyframes fadein{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.fadein{animation:fadein .35s ease forwards}

.back-row{width:100%;max-width:460px;margin-bottom:1rem;position:relative;z-index:1}
.back-btn{display:inline-flex;align-items:center;gap:.35rem;font-size:.65rem;font-weight:600;color:var(--t3);text-decoration:none;transition:color .15s}
.back-btn:hover{color:var(--t1)}
.back-btn svg{width:12px;height:12px}

.card{width:100%;max-width:460px;background:var(--bg1);border:1px solid var(--line2);border-radius:4px;overflow:hidden;position:relative;z-index:1;box-shadow:0 0 0 1px rgba(255,255,255,.03),0 8px 24px rgba(0,0,0,.5)}
.c-head{padding:1.1rem 1.25rem;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:.75rem}
.c-icon{width:38px;height:38px;border-radius:4px;background:var(--bg2);border:1px solid var(--line2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.c-icon svg{width:17px;height:17px;color:var(--em)}
.c-title{font-weight:700;font-size:.85rem}
.c-sub{font-size:.6rem;color:var(--t3);margin-top:.15rem}
.c-body{padding:1.25rem}
.c-foot{padding:.7rem 1.25rem;border-top:1px solid var(--line);text-align:center;font-size:.6rem;color:var(--t3)}

.step{display:none}.step.active{display:block}

.f-label{font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--t3);display:block;margin-bottom:.35rem}
.f-inp{width:100%;background:var(--bg2);border:1px solid var(--line);border-radius:var(--rs);padding:.65rem .9rem;color:var(--t1);font-family:var(--font);font-size:.8rem;outline:none;transition:border-color .18s}
.f-inp:focus{border-color:rgba(var(--em-rgb),.35)}
.f-inp::placeholder{color:var(--t4)}
.f-note{font-size:.6rem;color:var(--t3);margin-top:.35rem;line-height:1.5}

.info-card{background:var(--bg2);border:1px solid rgba(var(--em-rgb),.15);border-radius:var(--rs);padding:.85rem 1rem;margin-bottom:1rem}
.info-head{display:flex;align-items:center;gap:.5rem;margin-bottom:.65rem}
.info-dot{width:7px;height:7px;border-radius:50%;background:var(--em);flex-shrink:0;box-shadow:0 0 6px rgba(var(--em-rgb),.6)}
.info-username{font-weight:700;font-size:.82rem}
.info-row{display:flex;justify-content:space-between;font-size:.7rem;padding:.22rem 0;border-bottom:1px solid var(--line)}
.info-row:last-child{border:none}
.info-k{color:var(--t3)}.info-v{font-weight:600}
.info-v.warn{color:var(--yellow)}.info-v.ok{color:var(--em)}

.dur-label{font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--t3);margin-bottom:.5rem;display:block}
.dur-grid{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.85rem;position:relative}
.dur-radio{display:none}
.dur-lbl{
  flex:1;min-width:90px;padding:.65rem .5rem;border-radius:var(--rs);
  border:1px solid var(--line);background:var(--bg2);
  text-align:center;cursor:pointer;transition:all .18s;
}
.dur-lbl:hover{border-color:var(--line2)}
.dur-radio:checked + .dur-lbl{border-color:rgba(var(--em-rgb),.4);background:rgba(var(--em-rgb),.07)}
.dur-days{font-weight:700;font-size:.82rem;display:block}
.dur-price{font-size:.65rem;color:var(--t3);display:block;margin-top:.15rem}
.dur-radio:checked + .dur-lbl .dur-days{color:var(--em)}
.dur-radio:checked + .dur-lbl .dur-price{color:var(--em2)}

.total-row{display:flex;justify-content:space-between;align-items:center;padding:.7rem 0;border-top:1px solid var(--line);margin-bottom:.85rem}
.total-lbl{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--t3)}
.total-val{font-family:'DM Sans',system-ui;font-size:1.5rem;letter-spacing:-.02em}

.ph-wrap{margin-bottom:1rem}
.ph-row{display:flex;align-items:center;border:1px solid var(--line);border-radius:var(--rs);background:var(--bg2);overflow:hidden;transition:border-color .18s}
.ph-row:focus-within{border-color:rgba(var(--em-rgb),.35)}
.ph-pre{font-size:.75rem;font-weight:600;color:var(--t3);padding:0 .7rem;border-right:1px solid var(--line)}
.ph-inp{flex:1;background:none;border:none;padding:.65rem .75rem;color:var(--t1);font-family:var(--font);font-size:.8rem;outline:none}
.ph-inp::placeholder{color:var(--t4)}

.btn{width:100%;font-family:var(--font);font-size:.75rem;font-weight:700;padding:.72rem;border-radius:var(--rs);border:none;cursor:pointer;transition:all .18s;display:flex;align-items:center;justify-content:center;gap:.35rem;text-decoration:none;margin-bottom:.4rem}
.btn-em{background:var(--em);color:#040d09;box-shadow:0 0 18px rgba(var(--em-rgb),.2)}
.btn-em:hover:not(:disabled){background:var(--em2);box-shadow:0 0 26px rgba(var(--em-rgb),.35)}
.btn-em:disabled{opacity:.4;cursor:not-allowed}
.btn-ghost{background:var(--bg2);border:1px solid var(--line2);color:var(--t1)}
.btn-ghost:hover{border-color:var(--line3)}

.err-box{background:rgba(248,113,113,.06);border:1px solid rgba(248,113,113,.2);border-radius:var(--rs);padding:.6rem .85rem;font-size:.7rem;color:var(--red);margin-bottom:.75rem;display:none}
.err-box.show{display:block}

.toast{position:fixed;top:1rem;left:50%;transform:translateX(-50%) translateY(-12px);display:flex;align-items:center;gap:.5rem;padding:.65rem 1.1rem .65rem .75rem;border-radius:4px;font-size:.78rem;font-weight:700;z-index:9999;opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;white-space:nowrap;max-width:92vw;backdrop-filter:blur(12px);box-shadow:0 8px 24px rgba(0,0,0,.5)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{background:rgba(24,24,24,.97);border:1.5px solid rgba(var(--em-rgb),.5);color:var(--em)}
.toast.err{background:rgba(24,24,24,.97);border:1.5px solid rgba(248,113,113,.5);color:var(--red)}
.toast.info{background:rgba(24,24,24,.97);border:1.5px solid rgba(255,255,255,.15);color:var(--t1)}
.t-ico{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.toast.ok .t-ico{background:rgba(var(--em-rgb),.18)}.toast.err .t-ico{background:rgba(248,113,113,.18)}.toast.info .t-ico{background:rgba(255,255,255,.08)}

@media(max-width:480px){body{padding:1rem .75rem 2.5rem}}

body{
  background-color:#181818!important;
  background-image:
    linear-gradient(rgba(255,255,255,.028) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.028) 1px,transparent 1px)!important;
  background-size:50px 50px!important;
  position:relative;
}

body::before{
  content:'';position:fixed;top:40%;left:50%;
  transform:translate(-50%,-50%);
  width:800px;height:600px;
  background:radial-gradient(ellipse,rgba(255,255,255,.028) 0%,transparent 65%)!important;
  filter:blur(80px)!important;pointer-events:none;z-index:0;
}

body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse at 50% 0%,rgba(255,255,255,.018),transparent 55%),
    radial-gradient(ellipse at 100% 100%,rgba(255,255,255,.01),transparent 50%)!important;
}

button,a,[role=button]{min-height:36px}
@media(max-width:480px){
  button,a,[role=button]{min-height:40px}
}

@media(max-width:600px){
  .modal{border-radius:4px 20px 0 0!important;max-height:93vh!important;
    animation:_mobileModalIn .32s cubic-bezier(.32,1,.4,1) both!important}
  @keyframes _mobileModalIn{
    from{opacity:0;transform:translateY(100%)}
    to{opacity:1;transform:translateY(0)}
  }
  .overlay,.modal-bg{align-items:flex-end!important;padding:0!important}
  .cfd{border-radius:4px 20px 0 0!important;max-width:100%!important;width:100%!important}
}

.m-body,.cnt-tbl-scroll,.ord-card,.dep-card{-webkit-overflow-scrolling:touch}

.card,.ord-card,.dep-card,.acc-card{
  animation:_cardIn .4s cubic-bezier(.22,1,.36,1) both;
}
@keyframes _cardIn{
  from{opacity:0;transform:translateY(16px) scale(.98)}
  to{opacity:1;transform:none}
}

button:active:not(:disabled){transform:scale(.97)!important;transition:transform .08s!important}

.sec.on{animation:_secIn .3s cubic-bezier(.22,1,.36,1) both}
@keyframes _secIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

.cnt-tbl tbody tr{transition:background .12s ease}

.f-inp,.pf-input,.finp,.l-inp,.f-inp{transition:border-color .15s ease,box-shadow .15s ease!important}

@keyframes _pulse{0%{box-shadow:0 0 0 0 rgba(52,211,153,.35)}70%{box-shadow:0 0 0 8px rgba(52,211,153,0)}100%{box-shadow:0 0 0 0 rgba(52,211,153,0)}}
.ab-pulse{animation:_pulse 2s ease infinite!important}

@keyframes _shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel{background:linear-gradient(90deg,var(--bg1) 25%,var(--bg2) 50%,var(--bg1) 75%)!important;background-size:400% 100%!important;animation:_shimmer 1.6s ease infinite!important}

.modal-bg,.overlay,.cfd-bg{transition:opacity .2s ease!important}

.toast.on,.notif.show{animation:_toastIn .28s cubic-bezier(.34,1.56,.64,1) both!important}
@keyframes _toastIn{from{opacity:0;transform:translateX(-50%) translateY(-20px) scale(.9)}to{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}}

:root{--trans:.18s cubic-bezier(.4,0,.2,1)}

.nav-btn,.n-btn{border-radius:4px!important;transition:all var(--trans)!important}

.btn-em,.m-pay-btn,.l-btn,.submit-btn,.free-claim-btn{
  border-radius:4px!important;
  transition:all var(--trans)!important;
  position:relative;overflow:hidden;
}
.btn-em:not(:disabled){box-shadow:0 4px 18px rgba(52,211,153,.22)!important}
.btn-em:hover:not(:disabled){
  box-shadow:0 6px 26px rgba(52,211,153,.35)!important;
  transform:translateY(-1px)!important;
}
.btn-em:active:not(:disabled){transform:translateY(0)!important}

.f-inp:focus,.finp:focus,.l-inp:focus,.ph-inp:focus,.pf-input:focus,.cnt-search:focus,.srv-search:focus{
  box-shadow:0 0 0 3px rgba(52,211,153,.07)!important;
}

.card:hover,.ord-card:hover,.plan-card:hover,.info-link-card:hover{
  transition:all var(--trans)!important;
}

.badge,.qr-badge,.ord-status,.sbadge,.card-badge{border-radius:4px!important}

::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:2px}

.wrap,.main,.c-body{animation:_pageIn .35s ease both}
@keyframes _pageIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

nav,.nav,.topbar{backdrop-filter:blur(12px)!important;-webkit-backdrop-filter:blur(12px)!important}

.btn-sm,.vc-apply-btn,.cnt-buy-btn,.cnt-buy,.receipt-btn{border-radius:4px!important}

.cnt-sort-btn,.dur-lbl,.days-lbl,.cat{border-radius:4px!important}
</style>

<style>

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--line2);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:var(--line3)}
body{
  background-color:var(--bg) !important;
  background-image:linear-gradient(rgba(255,255,255,.022) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.022) 1px,transparent 1px) !important;
  background-size:40px 40px !important;
}
::selection{background:rgba(74,222,128,.18);color:#e5e5e5}
</style>
</head>
<body>
<div class="toast" id="toast"><div class="t-ico" id="toastIco"></div><span id="toastMsg"></span></div>

<div class="back-row">
  <a href="/" class="back-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
    Kembali ke Toko
  </a>
</div>

<div class="card fadein">
  <div class="c-head">
    <div class="c-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
        <path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
    </div>
    <div>
      <div class="c-title">Perpanjang Panel</div>
      <div class="c-sub">Tambah durasi panel Pterodactyl yang sudah aktif</div>
    </div>
  </div>

  <div class="c-body">

    <div class="step active" id="step1">
      <label class="f-label">Username Panel</label>
      <input type="text" class="f-inp" id="usernameInp" placeholder="contoh: botku123"
        maxlength="20" oninput="this.value=this.value.replace(/[^a-z0-9_]/gi,'').toLowerCase()"
        onkeydown="if(event.key==='Enter')doLookup()">
      <div class="f-note">Masukkan username panel yang sudah aktif. Username harus persis sama dengan yang dipakai saat beli.</div>
      <div class="err-box" id="lookupErr"></div>
      <div style="height:.85rem"></div>
      <button class="btn btn-em" id="lookupBtn" onclick="doLookup()">Cek Panel &rarr;</button>
      <a href="/track" class="btn btn-ghost">Track Order</a>
    </div>

    <div class="step" id="step2">

      <div class="info-card" id="infoCard"></div>

      <label class="dur-label">Pilih Durasi Perpanjangan</label>
      <div class="dur-grid" id="durGrid"></div>

      <div class="ph-wrap">
        <label class="f-label">WhatsApp <span style="color:var(--t3);font-size:.6rem">(opsional)</span></label>
        <div class="ph-row">
          <span class="ph-pre">+62</span>
          <input type="number" class="ph-inp" id="phoneInp" placeholder="812xxxxxxxx">
        </div>
      </div>

      <div class="total-row">
        <span class="total-lbl">Total Perpanjangan</span>
        <span class="total-val" id="totalEl">—</span>
      </div>

      <div class="err-box" id="orderErr"></div>
      <button class="btn btn-em" id="orderBtn" onclick="doOrder()" disabled>Bayar Sekarang</button>
      <button class="btn btn-ghost" onclick="goStep(1)">&#8592; Kembali</button>
    </div>

  </div>

  <div class="c-foot">Perpanjang otomatis · Expiry langsung diupdate · Ryysengtor QRIS</div>
</div>

<script>
var panelData  = null;
var selDays    = 0;
var selPrice   = 0;
var idr=function(n){var v=Number(n);if(!isFinite(v)||isNaN(v))v=0;return 'Rp'+v.toLocaleString('id-ID');};
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function toast(m,type){var t=document.getElementById('toast'),ic=document.getElementById('toastIco'),ms=document.getElementById('toastMsg');type=type||'ok';var icons={ok:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" width="10" height="10"><polyline points="20 6 9 17 4 12"/></svg>',err:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" width="10" height="10"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>',info:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" width="10" height="10"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>'};if(ic)ic.innerHTML=icons[type]||icons.ok;if(ms)ms.textContent=m;t.className='toast show '+type;clearTimeout(t._tt);t._tt=setTimeout(function(){t.classList.remove('show');},type==='err'?4000:2500);}
function showErr(elId, msg){ var e=document.getElementById(elId); e.textContent=msg; e.classList.add('show'); }
function hideErr(elId){ document.getElementById(elId).classList.remove('show'); }

function goStep(n) {
  document.querySelectorAll('.step').forEach(function(s){ s.classList.remove('active'); });
  document.getElementById('step'+n).classList.add('active');
}

function fmtDate(ts) {
  if (!ts) return '—';
  return new Date(ts).toLocaleDateString('id-ID',{day:'2-digit',month:'long',year:'numeric'});
}

function daysLeft(ts) {
  if (!ts) return 0;
  return Math.max(0, Math.ceil((ts - Date.now()) / 86400000));
}

async function doLookup() {
  var username = document.getElementById('usernameInp').value.trim();
  if (!username) return;
  hideErr('lookupErr');
  var btn = document.getElementById('lookupBtn');
  btn.disabled = true; btn.textContent = 'Mencari...';

  try {
    var r = await fetch('/api/renew/lookup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: 'username=' + encodeURIComponent(username),
    });
    var j = await r.json();
    if (!j.ok) {
      showErr('lookupErr', j.message || 'Tidak ditemukan.');
      btn.disabled = false; btn.textContent = 'Cek Panel →';
      return;
    }
    panelData = j;
    renderStep2();
    goStep(2);
  } catch(e) {
    showErr('lookupErr', 'Koneksi error: ' + e.message);
  }
  btn.disabled = false; btn.textContent = 'Cek Panel →';
}

async function renderStep2() {
  var d = panelData;
  var left = daysLeft(d.expiresAt);
  var expStatus = left <= 3 ? 'warn' : 'ok';
  var expText   = left <= 0 ? '⚠ Sudah expired' : left + ' hari lagi';

  var statusWarning = '';
  if (d.panelStatus === 'EXPIRED' || left <= 0) {
    statusWarning = '<div style="background:rgba(251,191,36,.07);border:1px solid rgba(251,191,36,.25);border-radius:4px;padding:.55rem .8rem;font-size:.68rem;color:#fbbf24;margin-bottom:.75rem">⚠ Panel sudah expire. Perpanjang untuk mengaktifkan kembali.</div>';
  }
  if (d.pteroStatus === 'deleted') {
    statusWarning = '<div style="background:rgba(248,113,113,.07);border:1px solid rgba(248,113,113,.25);border-radius:4px;padding:.55rem .8rem;font-size:.68rem;color:#f87171;margin-bottom:.75rem">⚠ Server dihapus dari panel. Perpanjang akan memperbarui expiry di sistem. Hubungi admin untuk reinstall server.</div>';
  }

  document.getElementById('infoCard').innerHTML =
    statusWarning
    + '<div class="info-head"><div class="info-dot"></div><div class="info-username">@' + esc(d.username) + '</div></div>'
    + '<div class="info-row"><span class="info-k">Paket</span><span class="info-v">' + esc(d.ram || d.plan || '') + '</span></div>'
    + '<div class="info-row"><span class="info-k">Expired</span><span class="info-v">' + fmtDate(d.expiresAt) + '</span></div>'
    + '<div class="info-row"><span class="info-k">Sisa Hari</span><span class="info-v ' + expStatus + '">' + expText + '</span></div>';

  var dayPrices = {7: 0, 14: 0, 30: 0};
  try {
    var pr = await fetch('/api/products');
    var pj = await pr.json();
    if (pj.ok) {
      var panelProd = pj.data.find(function(p){ return p.type === 'panel'; });
      if (panelProd) {

        var matchVar = panelProd.variants.find(function(v){ return v.plan === d.plan; })
          || (d.variantId && panelProd.variants.find(function(v){ return v.id === d.variantId; }))
          || panelProd.variants[0];
        if (matchVar && matchVar.dayPrices) {
          dayPrices = matchVar.dayPrices;
        } else if (matchVar && matchVar.price) {

          dayPrices = {
            7:  Math.round(matchVar.price * 7  / 30),
            14: Math.round(matchVar.price * 14 / 30),
            30: matchVar.price,
          };
        }
      }
    }
  } catch(e) {}

  var grid = document.getElementById('durGrid');
  grid.innerHTML = '';
  [[7,'1 Minggu'],[14,'2 Minggu'],[30,'1 Bulan']].forEach(function(opt, idx) {
    var days = opt[0], label = opt[1];
    var price = dayPrices[days] || dayPrices[String(days)] || 0;
    var radio = document.createElement('input');
    radio.type = 'radio'; radio.name = 'durSel'; radio.id = 'dur' + days;
    radio.value = days; radio.className = 'dur-radio';
    radio.style.position = 'absolute'; radio.style.opacity = '0';
    var lbl = document.createElement('label');
    lbl.className = 'dur-lbl'; lbl.htmlFor = 'dur' + days;
    lbl.innerHTML = '<span class="dur-days">' + label + '</span><span class="dur-price">' + (price ? idr(price) : '—') + '</span>';
    radio.addEventListener('change', function() {
      selDays = parseInt(this.value);
      selPrice = dayPrices[selDays] || dayPrices[String(selDays)] || 0;
      document.getElementById('totalEl').textContent = selPrice ? idr(selPrice) : '—';
      document.getElementById('orderBtn').disabled = !selPrice;
    });
    grid.appendChild(radio); grid.appendChild(lbl);

    if (idx === 0) { radio.checked = true; selDays = days; selPrice = price; }
  });

  if (selPrice) {
    document.getElementById('totalEl').textContent = idr(selPrice);
    document.getElementById('orderBtn').disabled = false;
  }
}

async function doOrder() {
  if (!selDays || !panelData) return;
  hideErr('orderErr');
  var btn = document.getElementById('orderBtn');
  btn.disabled = true; btn.textContent = 'Memproses...';

  try {
    var phone = document.getElementById('phoneInp').value.trim();
    var r = await fetch('/api/renew/order', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: 'username=' + encodeURIComponent(panelData.username)
          + '&days=' + selDays
          + (phone ? '&phone=' + encodeURIComponent(phone) : ''),
    });
    var j = await r.json();
    if (j.ok) {
      window.location.href = '/pay?id=' + j.orderId;
    } else {
      showErr('orderErr', j.message || 'Gagal membuat order.');
      btn.disabled = false; btn.textContent = 'Bayar Sekarang';
    }
  } catch(e) {
    showErr('orderErr', 'Koneksi error: ' + e.message);
    btn.disabled = false; btn.textContent = 'Bayar Sekarang';
  }
}

function _hexToRgb(hex) {
  hex = hex.replace('#','');
  if (hex.length === 3) hex = hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
  var r = parseInt(hex.substring(0,2),16);
  var g = parseInt(hex.substring(2,4),16);
  var b = parseInt(hex.substring(4,6),16);
  return r+','+g+','+b;
}
function applyGlobalSettings(s) {
  if (!s) return;
  if (s.primaryColor) {
    document.documentElement.style.setProperty('--em', s.primaryColor);
    document.documentElement.style.setProperty('--em2', s.primaryColor);
    document.documentElement.setAttribute('data-em', s.primaryColor);

    var _rgb = _hexToRgb(s.primaryColor);
    document.documentElement.style.setProperty('--em-rgb', _rgb);
    var _tmeta = document.querySelector('meta[name="theme-color"]'); if (_tmeta) _tmeta.setAttribute('content', s.primaryColor);
  }
  if (s.storeName) {
    document.querySelectorAll('[data-store-name], #storeName, #ftName, .js-store-name').forEach(function(el){ el.textContent = s.storeName; });
    if (!document.title.toLowerCase().includes('admin')) document.title = s.storeName;
  }
  if (s.logoUrl) {
    document.querySelectorAll('[data-logo-img]').forEach(function(el){ el.src = s.logoUrl; el.style.display = ''; });
    document.querySelectorAll('[data-logo-placeholder]').forEach(function(el){ el.style.display = 'none'; });
  }
  if (s.footerText) document.querySelectorAll('[data-footer-text]').forEach(function(el){ el.textContent = s.footerText; });
  if (s.wa) document.querySelectorAll('[data-wa-link]').forEach(function(el){ el.href = s.wa; });
  if (s.announcement) { var ab = document.getElementById('announcementBar'); if (ab) { ab.textContent = s.announcement; ab.style.display = ''; } }
  applyGlobalBg(s);
}
function applyGlobalBg(s) {
  var old = document.getElementById('_gbg'); if (old) old.remove();
  if (!s || !s.bgUrl) return;
  var op = s.bgOpacity != null ? parseFloat(s.bgOpacity) : 0.15;
  var el = document.createElement('div');
  el.id = '_gbg';
  el.setAttribute('aria-hidden','true');
  el.style.cssText = 'position:fixed;inset:0;z-index:-1;pointer-events:none;overflow:hidden;will-change:transform;transform:translateZ(0)';
  if (s.bgType === 'video') {
    var v = document.createElement('video');
    v.src = s.bgUrl; v.autoplay = true; v.loop = true; v.muted = true; v.playsInline = true;
    v.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:'+op+';transform:translateZ(0)';
    el.appendChild(v);
  } else {
    var img = document.createElement('div');
    img.style.cssText = 'position:absolute;inset:0;background-image:url('+JSON.stringify(s.bgUrl)+');background-size:cover;background-position:center;opacity:'+op+';transform:translateZ(0)';
    el.appendChild(img);
  }
  document.body.insertBefore(el, document.body.firstChild);
}

fetch('/api/products').then(function(r){return r.json();}).then(function(j){
  if(j.settings) applyGlobalSettings(j.settings);
}).catch(function(){});

(function connectStoreSSE() {
  try {
    var _src = new EventSource('/api/store/stream');
    _src.onmessage = function(e) {
      try {
        var d = JSON.parse(e.data);

        if (d.type === 'reconnect') { _src.close(); setTimeout(connectStoreSSE, 1500); return; }
        if (d.type === 'settings_update' && d.settings) {
          applyGlobalSettings(d.settings);
        }
        if (d.type === 'reload') {

          fetch('/api/products').then(function(r){return r.json();}).then(function(j){
            if (j.settings) applyGlobalSettings(j.settings);
          }).catch(function(){});
        }
        if (d.type === 'maintenance' && d.on) {
          document.body.innerHTML = '<div style="position:fixed;inset:0;background:#0a0a0f;display:flex;align-items:center;justify-content:center;font-family:system-ui,sans-serif;color:#f0f0f0;font-size:.9rem;text-align:center;padding:2rem">' + esc(d.msg || 'Sedang dalam maintenance.') + '</div>';
        }
      } catch(ex){}
    };

    _src.onerror = function(){ _src.close(); setTimeout(connectStoreSSE, 5000); };
  } catch(ex){}
})();
